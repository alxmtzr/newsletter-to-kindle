sources:
  - name: tldr
    type: imap_email
    enabled: true
    match:
      from: dan@tldrnewsletter.com
    parser: tldr_parser
    metadata:
      title_prefix: "TLDR"
      author: "Dan Ni"
      author_sort: "Ni, Dan"
      publisher: "TLDR Newsletter"
      subjects:
        - Newsletter
        - Technology
      language: "en"
      rights: "© TLDR Newsletter. Personal archival copy."
    pipeline:
      - build_epub
      - validate_epub
      - "send:kindle"

  # Uncomment to enable TLDR AI once you subscribe with the dedicated Gmail
