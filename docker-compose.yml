services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: newsletter-kindle
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
